<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMPE Exam Quiz</title>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$','$'],['\\(','\\)']],
    displayMath: [['$$','$$'],['\\[','\\]']]
  },
  startup: {
    ready: () => {
      MathJax.startup.defaultReady();
      window.mathJaxReady = true;
    }
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
:root {
  --bg: #f8f6f2;
  --bg2: #efeae3;
  --bg3: #e2ddd5;
  --text: #2d2a26;
  --text2: #7a756e;
  --accent: #5b7fa6;
  --accent-hover: #4a6e95;
  --correct: #6b9e78;
  --correct-bg: #dceee0;
  --wrong: #c4645a;
  --wrong-bg: #f5ddd9;
  --border: #d4cfc7;
  --card-bg: #ffffff;
  --card-shadow: 0 2px 16px rgba(45,42,38,0.06);
  --radius: 14px;
  --header-gradient: linear-gradient(135deg, #5b7fa6 0%, #7a9bb8 50%, #a3b5c8 100%);
}
[data-theme="dark"] {
  --bg: #1a1917;
  --bg2: #262420;
  --bg3: #33302b;
  --text: #e8e4de;
  --text2: #9e9a93;
  --accent: #7da3c7;
  --accent-hover: #93b5d5;
  --correct: #7db88a;
  --correct-bg: #1e2e22;
  --wrong: #d47a72;
  --wrong-bg: #2e1e1c;
  --border: #4a4640;
  --card-bg: #262420;
  --card-shadow: 0 2px 16px rgba(0,0,0,0.25);
  --header-gradient: linear-gradient(135deg, #3d5a7a 0%, #4a6e8f 50%, #5b7fa6 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
}
/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  margin: -20px -20px 20px -20px;
  background: var(--header-gradient);
  border-radius: 0 0 var(--radius) var(--radius);
  color: #fff;
}
.header h1 {
  font-size: 1.2rem;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
/* Timer */
.timer-display {
  font-size: 0.85rem;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.15);
  padding: 4px 10px;
  border-radius: 8px;
  font-variant-numeric: tabular-nums;
}
.timer-display .q-timer {
  color: rgba(255,255,255,0.7);
  font-size: 0.75rem;
  margin-left: 6px;
}
.theme-toggle {
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 1.1rem;
  color: #fff;
  color: var(--text);
  transition: background 0.2s;
}
.theme-toggle:hover { background: var(--border); }

/* Progress bar */
.progress-container {
  background: var(--bg3);
  border-radius: 8px;
  height: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 8px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
}

/* Cards */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  padding: 28px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

/* Course selection */
.course-select { text-align: center; padding: 40px 20px; }
.course-select h2 { font-size: 1.8rem; margin-bottom: 8px; }
.course-select p { color: var(--text2); margin-bottom: 32px; font-size: 1.05rem; }
.course-btn {
  display: block;
  width: 100%;
  padding: 18px 24px;
  margin-bottom: 14px;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.course-btn:hover {
  border-color: var(--accent);
  background: var(--bg3);
  transform: translateY(-1px);
}
.course-btn .course-code { color: var(--accent); }
.course-btn .course-desc {
  display: block;
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text2);
  margin-top: 4px;
}

/* Mode selection */
.mode-select { text-align: center; }
.mode-select h2 { font-size: 1.4rem; margin-bottom: 6px; }
.mode-select .subtitle { color: var(--text2); margin-bottom: 24px; }
.mode-btn {
  display: block;
  width: 100%;
  padding: 16px 20px;
  margin-bottom: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.mode-btn.secondary {
  background: var(--bg2);
  color: var(--text);
  border: 2px solid var(--border);
}
.mode-btn.secondary:hover { border-color: var(--accent); }
.back-link {
  display: inline-block;
  margin-top: 16px;
  color: var(--accent);
  cursor: pointer;
  font-size: 0.9rem;
  border: none;
  background: none;
  text-decoration: underline;
}

/* Question */
.q-tier {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
  background: var(--bg3);
  color: var(--text2);
}
.q-number {
  font-size: 0.9rem;
  color: var(--text2);
  margin-bottom: 6px;
}
.q-text {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 20px;
  line-height: 1.5;
}
.q-text .MathJax { font-size: 1em !important; }

/* Question tables */
.q-table {
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 0.92rem;
  font-weight: 400;
  width: auto;
  min-width: 60%;
}
.q-table th, .q-table td {
  border: 1px solid var(--border);
  padding: 6px 14px;
  text-align: center;
}
.q-table th {
  background: var(--bg3);
  font-weight: 700;
  color: var(--text);
}
.q-table td { background: var(--card-bg); }
.q-table tr:nth-child(even) td { background: var(--bg2); }
.q-table td:first-child, .q-table th:first-child { text-align: left; font-weight: 600; }

/* Options */
.option-btn {
  display: block;
  width: 100%;
  padding: 14px 18px;
  margin-bottom: 10px;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 0.95rem;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.5;
}
.option-btn:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--bg3);
}
.option-btn.disabled { cursor: default; opacity: 0.85; }
.option-btn.correct {
  border-color: var(--correct) !important;
  background: var(--correct-bg) !important;
  opacity: 1 !important;
}
.option-btn.wrong {
  border-color: var(--wrong) !important;
  background: var(--wrong-bg) !important;
  opacity: 1 !important;
}
.option-letter {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  border-radius: 50%;
  background: var(--bg3);
  font-weight: 700;
  font-size: 0.85rem;
  margin-right: 12px;
  flex-shrink: 0;
}
.option-btn.correct .option-letter { background: var(--correct); color: #fff; }
.option-btn.wrong .option-letter { background: var(--wrong); color: #fff; }
.option-content { display: flex; align-items: flex-start; }
.option-text { flex: 1; }

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 16px;
  border-radius: 10px;
  font-size: 0.95rem;
  display: none;
}
.feedback.correct-fb {
  background: var(--correct-bg);
  border: 1px solid var(--correct);
}
.feedback.wrong-fb {
  background: var(--wrong-bg);
  border: 1px solid var(--wrong);
}
.feedback .fb-title {
  font-weight: 700;
  font-size: 1.05rem;
  margin-bottom: 8px;
}
.feedback .fb-explanation {
  color: var(--text);
  line-height: 1.6;
}

/* Next button */
.next-btn {
  display: none;
  width: 100%;
  padding: 14px;
  margin-top: 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.next-btn:hover { background: var(--accent-hover); }

/* Summary */
.summary { text-align: center; }
.summary h2 { font-size: 1.6rem; margin-bottom: 8px; }
.score-display {
  font-size: 3rem;
  font-weight: 800;
  color: var(--accent);
  margin: 16px 0;
}
.score-pct {
  font-size: 1.2rem;
  color: var(--text2);
  margin-bottom: 24px;
}
.score-bar-container {
  background: var(--bg3);
  border-radius: 10px;
  height: 14px;
  margin-bottom: 28px;
  overflow: hidden;
}
.score-bar {
  height: 100%;
  border-radius: 10px;
  transition: width 1s ease;
}
.summary-actions {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}
.summary-actions button {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.restart-btn { background: var(--accent); color: #fff; }
.restart-btn:hover { background: var(--accent-hover); }
.switch-btn { background: var(--bg2); color: var(--text); border: 2px solid var(--border) !important; }
.switch-btn:hover { border-color: var(--accent) !important; }

/* Review list */
.review-list { text-align: left; }
.review-item {
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
}
.review-item.review-correct { border-left: 4px solid var(--correct); }
.review-item.review-wrong { border-left: 4px solid var(--wrong); }
.review-q {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 4px;
}
.review-detail {
  font-size: 0.85rem;
  color: var(--text2);
  line-height: 1.5;
}
.review-detail strong { color: var(--text); }
.review-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  justify-content: center;
}
.filter-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
}
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .card { padding: 18px; }
  .course-select h2 { font-size: 1.4rem; }
  .q-text { font-size: 1rem; }
  .option-btn { padding: 12px 14px; font-size: 0.9rem; }
  .summary-actions { flex-direction: column; }
  .score-display { font-size: 2.4rem; }
}

/* Nav buttons */
.nav-buttons {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.prev-btn {
  flex: 0 0 auto;
  padding: 12px 20px;
  background: var(--bg3);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  transition: all 0.2s;
}
.prev-btn:hover { background: var(--bg2); color: var(--text); }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease; }

/* Hide screens */
.screen { display: none; }
.screen.active { display: block; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Study Guide Modal */
.sg-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  overflow-y: auto;
  padding: 24px 12px;
}
.sg-overlay.active { display: flex; justify-content: center; align-items: flex-start; }
.sg-modal {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  max-width: 800px;
  width: 100%;
  padding: 32px;
  position: relative;
  margin: 20px auto;
  max-height: 90vh;
  overflow-y: auto;
}
.sg-close {
  position: sticky;
  top: 0;
  float: right;
  background: var(--bg3);
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 1.3rem;
  cursor: pointer;
  color: var(--text);
  z-index: 10;
}
.sg-close:hover { background: var(--wrong-bg); color: var(--wrong); }
.sg-modal h2 { font-size: 1.5rem; margin-bottom: 16px; color: var(--accent); }
.sg-modal h3 {
  font-size: 1.1rem;
  margin: 18px 0 8px 0;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--bg3);
  color: var(--text);
}
.sg-modal h4 {
  font-size: 0.95rem;
  margin: 12px 0 4px 0;
  color: var(--accent);
}
.sg-modal ul {
  margin: 4px 0 8px 18px;
  font-size: 0.9rem;
  line-height: 1.7;
}
.sg-modal li { margin-bottom: 2px; }
.sg-modal .sg-formula {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  margin: 6px 0;
  font-size: 0.92rem;
  overflow-x: auto;
}
.sg-modal .sg-section {
  margin-bottom: 20px;
}
.sg-modal code {
  background: var(--bg3);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.88rem;
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1 id="header-title">📝 CMPE Exam Prep</h1>
    <div class="header-right">
      <div class="timer-display" id="timer-display" style="display:none">
        <span id="total-timer">00:00</span>
        <span class="q-timer" id="q-timer">Q: 00:00</span>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
    </div>
  </div>

  <!-- Screen 1: Course Selection -->
  <div id="screen-course" class="screen active">
    <div class="card course-select fade-in">
      <h2>Choose Your Course</h2>
      <p>Select a course to start practicing</p>
      <button class="course-btn" onclick="selectCourse('cmpe260')">
        <span class="course-code">CMPE 260</span> — Reinforcement Learning
        <span class="course-desc">100 questions · Modules 9–17 · TRPO, PPO, DDPG, SAC, A3C & more</span>
      </button>
      <button class="course-btn" onclick="selectCourse('cmpe256')">
        <span class="course-code">CMPE 256</span> — Recommender Systems
        <span class="course-desc">100 questions · CF, MF, Deep Learning, Fairness, Bandits & more</span>
      </button>
    </div>
  </div>

  <!-- Screen 2: Mode Selection -->
  <div id="screen-mode" class="screen">
    <div class="card mode-select fade-in">
      <h2 id="mode-title"></h2>
      <p class="subtitle" id="mode-subtitle"></p>
      <button class="mode-btn" onclick="startQuiz(100)">📋 All 100 Questions (Shuffled)</button>
      <button class="mode-btn secondary" onclick="startQuiz(25)">⚡ Quick 25 (Random)</button>
      <button class="mode-btn secondary" onclick="startQuiz(10)">🎯 Quick 10 (Random)</button>
      <button class="mode-btn secondary" onclick="openStudyGuide()" style="margin-top:8px;border-color:var(--accent);color:var(--accent)">📖 Study Guide</button>
      <button class="back-link" onclick="showScreen('screen-course')">← Back to course selection</button>
    </div>
  </div>

  <!-- Screen 3: Quiz -->
  <div id="screen-quiz" class="screen">
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text">
      <span id="progress-label">Question 1 of 100</span>
      <span id="score-label">Score: 0/0</span>
    </div>
    <div class="card fade-in" id="question-card">
      <span class="q-tier" id="q-tier"></span>
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div id="options-container"></div>
      <div class="feedback" id="feedback">
        <div class="fb-title" id="fb-title"></div>
        <div class="fb-explanation" id="fb-explanation"></div>
      </div>
      <div class="nav-buttons">
        <button class="prev-btn" id="prev-btn" onclick="prevQuestion()">← Previous</button>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
      </div>
    </div>
  </div>

  <!-- Screen 4: Summary -->
  <div id="screen-summary" class="screen">
    <div class="card summary fade-in">
      <h2>Quiz Complete! 🎉</h2>
      <div class="score-display" id="final-score"></div>
      <div class="score-pct" id="final-pct"></div>
      <div class="score-bar-container">
        <div class="score-bar" id="score-bar"></div>
      </div>
      <div class="summary-actions">
        <button class="restart-btn" onclick="restartQuiz()">🔄 Restart</button>
        <button class="switch-btn" onclick="showScreen('screen-course')">📚 Switch Course</button>
      </div>
      <div class="review-filter">
        <button class="filter-btn active" data-filter="all" onclick="filterReview('all', this)">All</button>
        <button class="filter-btn" data-filter="wrong" onclick="filterReview('wrong', this)">❌ Wrong Only</button>
        <button class="filter-btn" data-filter="correct" onclick="filterReview('correct', this)">✅ Correct Only</button>
      </div>
      <div class="review-list" id="review-list"></div>
    </div>
  </div>
</div>

<!-- Study Guide Modal -->
<div class="sg-overlay" id="sg-overlay" onclick="if(event.target===this)closeStudyGuide()">
  <div class="sg-modal" id="sg-modal">
    <button class="sg-close" onclick="closeStudyGuide()">✕</button>
    <div id="sg-content"></div>
  </div>
</div>

<script>
// ===== QUESTION DATA =====
let QUESTIONS = {};

async function loadQuestions() {
  try {
    const resp = await fetch('questions.json');
    if (!resp.ok) throw new Error('Failed to load questions.json');
    QUESTIONS = await resp.json();
    console.log('✅ Loaded', Object.keys(QUESTIONS).map(k => k + ':' + QUESTIONS[k].length).join(', '));
  } catch (err) {
    console.error('Failed to load questions:', err);
    // Show error to user
    document.getElementById('screen-course').innerHTML = `
      <div class="card" style="text-align:center;padding:40px">
        <h2>⚠️ Failed to load questions</h2>
        <p style="color:var(--text2);margin-top:12px">Make sure <code>questions.json</code> is in the same directory.<br>
        This app must be served via HTTP (not file://).</p>
        <p style="color:var(--wrong);margin-top:8px;font-size:0.85rem">${err.message}</p>
      </div>`;
  }
}

// ===== STATE =====
let state = {
  course: null,
  questions: [],
  currentIndex: 0,
  score: 0,
  answered: 0,
  answers: [], // {qIndex, selected, correct, isCorrect, timeSpent}
  theme: localStorage.getItem('quiz-theme') || 'light',
  totalStartTime: null,
  questionStartTime: null,
  timerInterval: null,
  totalElapsed: 0
};

// ===== THEME =====
function initTheme() {
  // Check system preference if no saved preference
  if (!localStorage.getItem('quiz-theme')) {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      state.theme = 'dark';
    }
  }
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  }
  // Listen for system theme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('quiz-theme')) {
      state.theme = e.matches ? 'dark' : 'light';
      applyTheme();
    }
  });
}
function applyTheme() {
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('.theme-toggle').textContent = '🌙';
  }
}
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('quiz-theme', state.theme);
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('.theme-toggle').textContent = '🌙';
  }
}

// ===== NAVIGATION =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-course') {
    document.getElementById('header-title').textContent = '📝 CMPE Exam Prep';
    document.getElementById('timer-display').style.display = 'none';
    if (state.timerInterval) clearInterval(state.timerInterval);
  }
}

// ===== TIMER =====
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function startTimer() {
  state.totalStartTime = Date.now();
  state.questionStartTime = Date.now();
  document.getElementById('timer-display').style.display = 'inline-block';
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    const totalSec = Math.floor((Date.now() - state.totalStartTime) / 1000);
    const qSec = Math.floor((Date.now() - state.questionStartTime) / 1000);
    document.getElementById('total-timer').textContent = formatTime(totalSec);
    document.getElementById('q-timer').textContent = 'Q: ' + formatTime(qSec);
  }, 1000);
}
function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.totalElapsed = Math.floor((Date.now() - state.totalStartTime) / 1000);
  document.getElementById('timer-display').style.display = 'none';
}
function resetQuestionTimer() {
  state.questionStartTime = Date.now();
}
function getQuestionTime() {
  return Math.floor((Date.now() - state.questionStartTime) / 1000);
}

// ===== COURSE SELECTION =====
const COURSE_TITLES = {
  cmpe260: 'CMPE 260 — Reinforcement Learning',
  cmpe256: 'CMPE 256 — Recommender Systems'
};
function selectCourse(course) {
  state.course = course;
  document.getElementById('mode-title').textContent = COURSE_TITLES[course];
  document.getElementById('mode-subtitle').textContent = '100 questions available';
  document.getElementById('header-title').textContent = COURSE_TITLES[course];
  showScreen('screen-mode');
}

// ===== SHUFFLE =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== START QUIZ =====
function startQuiz(count) {
  const allQ = QUESTIONS[state.course];
  const shuffled = shuffle(allQ);
  state.questions = shuffled.slice(0, Math.min(count, shuffled.length));
  state.currentIndex = 0;
  state.score = 0;
  state.answered = 0;
  state.answers = [];
  const modeLabel = count >= 100 ? 'All 100' : `Quick ${count}`;
  document.getElementById('header-title').textContent = `${COURSE_TITLES[state.course]} · ${modeLabel}`;
  showScreen('screen-quiz');
  startTimer();
  renderQuestion();
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;
  const idx = state.currentIndex;

  // Check if this question was already answered
  const prevAnswer = state.answers.find(a => a.qIndex === idx);

  // Progress
  document.getElementById('progress-bar').style.width = ((idx / total) * 100) + '%';
  document.getElementById('progress-label').textContent = `Question ${idx + 1} of ${total}`;
  document.getElementById('score-label').textContent = `Score: ${state.score}/${state.answered}`;

  // Previous button visibility
  const prevBtn = document.getElementById('prev-btn');
  prevBtn.style.display = 'inline-block';
  if (idx > 0) {
    prevBtn.style.opacity = '1';
    prevBtn.style.pointerEvents = 'auto';
  } else {
    prevBtn.style.opacity = '0.3';
    prevBtn.style.pointerEvents = 'none';
  }

  // Question
  document.getElementById('q-tier').textContent = q.tier;
  document.getElementById('q-number').textContent = `Q${q.num}`;
  document.getElementById('q-text').innerHTML = q.question.replace(/\n/g, '<br>');

  // Options
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  ['A', 'B', 'C', 'D'].forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="option-content"><span class="option-letter">${letter}</span><span class="option-text">${q.options[letter]}</span></div>`;
    btn.dataset.letter = letter;

    if (prevAnswer) {
      // Already answered — show in review mode
      btn.classList.add('disabled');
      btn.onclick = null;
      if (letter === prevAnswer.correct) btn.classList.add('correct');
      if (letter === prevAnswer.selected && !prevAnswer.isCorrect) btn.classList.add('wrong');
    } else {
      btn.onclick = () => selectAnswer(letter);
    }
    container.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  if (prevAnswer) {
    // Show feedback for previously answered question
    fb.style.display = 'block';
    if (prevAnswer.isCorrect) {
      fb.className = 'feedback correct-fb';
      document.getElementById('fb-title').textContent = '✅ Correct!';
    } else {
      fb.className = 'feedback wrong-fb';
      document.getElementById('fb-title').textContent = `❌ Wrong — Correct answer is ${prevAnswer.correct}`;
    }
    document.getElementById('fb-explanation').innerHTML = q.explanation.replace(/\n/g, '<br>');
    // Show next button
    if (idx < total - 1) {
      nextBtn.textContent = 'Next Question →';
      nextBtn.style.display = 'block';
    } else {
      nextBtn.textContent = 'View Results →';
      nextBtn.style.display = 'block';
    }
  } else {
    fb.style.display = 'none';
    fb.className = 'feedback';
    nextBtn.style.display = 'none';
  }

  // Re-render MathJax
  typesetMath();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function typesetMath() {
  if (window.MathJax && MathJax.typesetPromise) {
    // Clear MathJax's internal cache of processed elements so re-inserted
    // content (feedback, review list, study guide) gets re-typeset correctly.
    if (MathJax.startup && MathJax.startup.document) {
      MathJax.startup.document.clear();
      MathJax.startup.document.updateDocument();
    }
    MathJax.typesetPromise().catch(err => console.log('MathJax typeset:', err));
  }
}

// ===== SELECT ANSWER =====
function selectAnswer(selected) {
  const q = state.questions[state.currentIndex];
  const correct = q.answer;
  const isCorrect = selected === correct;

  state.answered++;
  if (isCorrect) state.score++;

  const timeSpent = getQuestionTime();
  state.answers.push({
    qIndex: state.currentIndex,
    question: q,
    selected,
    correct,
    isCorrect,
    timeSpent
  });

  // Disable all options
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(btn => {
    btn.classList.add('disabled');
    btn.onclick = null;
    const letter = btn.dataset.letter;
    if (letter === correct) btn.classList.add('correct');
    if (letter === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Show feedback
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'feedback correct-fb';
    document.getElementById('fb-title').textContent = '✅ Correct!';
  } else {
    fb.className = 'feedback wrong-fb';
    document.getElementById('fb-title').textContent = `❌ Wrong — Correct answer is ${correct}`;
  }
  document.getElementById('fb-explanation').innerHTML = q.explanation.replace(/\n/g, '<br>');

  // Update score display
  document.getElementById('score-label').textContent = `Score: ${state.score}/${state.answered}`;

  // Show next button
  const nextBtn = document.getElementById('next-btn');
  if (state.currentIndex < state.questions.length - 1) {
    nextBtn.textContent = 'Next Question →';
  } else {
    nextBtn.textContent = 'View Results →';
  }
  nextBtn.style.display = 'block';

  typesetMath();
}

// ===== PREVIOUS QUESTION =====
function prevQuestion() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ===== NEXT QUESTION =====
function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    showSummary();
  } else {
    resetQuestionTimer();
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ===== SUMMARY =====
function showSummary() {
  stopTimer();
  showScreen('screen-summary');
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);

  document.getElementById('final-score').textContent = `${state.score} / ${total}`;
  document.getElementById('final-pct').textContent = `${pct}% correct · ${formatTime(state.totalElapsed)} total`;

  const bar = document.getElementById('score-bar');
  bar.style.width = '0%';
  bar.style.background = pct >= 70 ? 'var(--correct)' : pct >= 50 ? '#ff9f0a' : 'var(--wrong)';
  setTimeout(() => { bar.style.width = pct + '%'; }, 100);

  document.getElementById('header-title').textContent = `${COURSE_TITLES[state.course]} · Results`;
  renderReviewList('all');
}

function renderReviewList(filter) {
  const list = document.getElementById('review-list');
  list.innerHTML = '';

  state.answers.forEach((a, i) => {
    if (filter === 'wrong' && a.isCorrect) return;
    if (filter === 'correct' && !a.isCorrect) return;

    const item = document.createElement('div');
    item.className = `review-item ${a.isCorrect ? 'review-correct' : 'review-wrong'}`;

    let detail = '';
    if (!a.isCorrect) {
      detail = `<div class="review-detail">
        Your answer: <strong>${a.selected}) ${a.question.options[a.selected]}</strong><br>
        Correct: <strong>${a.correct}) ${a.question.options[a.correct]}</strong>
        <span style="color:var(--text2);font-size:0.8rem;margin-left:8px">⏱ ${formatTime(a.timeSpent)}</span><br>
        <em>${a.question.explanation}</em>
      </div>`;
    } else {
      detail = `<div class="review-detail">✅ Answered: ${a.correct} <span style="color:var(--text2);font-size:0.8rem;margin-left:8px">⏱ ${formatTime(a.timeSpent)}</span></div>`;
    }

    item.innerHTML = `
      <div class="review-q">${a.isCorrect ? '✅' : '❌'} Q${a.question.num}. ${a.question.question.substring(0, 120)}${a.question.question.length > 120 ? '...' : ''}</div>
      ${detail}
    `;
    list.appendChild(item);
  });

  typesetMath();
}

function filterReview(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReviewList(filter);
}

// ===== RESTART =====
function restartQuiz() {
  startQuiz(state.questions.length);
}

// ===== STUDY GUIDE =====
const STUDY_GUIDE_FILES = {
  cmpe260: 'study-guide-cmpe260.html',
  cmpe256: 'study-guide-cmpe256.html'
};

async function openStudyGuide() {
  const file = STUDY_GUIDE_FILES[state.course];
  if (!file) return;
  const el = document.getElementById('sg-content');
  el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text2)">Loading study guide…</p>';
  document.getElementById('sg-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error('Failed to load ' + file);
    el.innerHTML = await resp.text();
    typesetMath();
  } catch (err) {
    el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--wrong)">⚠️ ' + err.message + '</p>';
  }
}

function closeStudyGuide() {
  document.getElementById('sg-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

// Close on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('sg-overlay').classList.contains('active')) {
    closeStudyGuide();
  }
});

// ===== INIT =====
initTheme();
loadQuestions();
</script>
